{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card text-center" style="max-width: 500px;">
        <div class="mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-dark rounded-circle border border-info mb-3" style="width: 80px; height: 80px; box-shadow: 0 0 15px rgba(0, 242, 254, 0.25);">
                <i class="fa-solid fa-compass-slash text-info" style="font-size: 2.5rem;"></i>
            </div>
            <h2 class="brand-glow mb-1">404 NOT FOUND</h2>
            <p class="text-muted small">Requested Node Unavailable</p>
        </div>
        
        <div class="alert alert-custom alert-info text-start mb-4">
            <i class="fa-solid fa-info-circle me-2"></i>
            The resource you are looking for does not exist on this Zero Trust network.
        </div>
        
        <div class="d-grid gap-2">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary-custom btn-lg"><i class="fa-solid fa-home me-2"></i>Return to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
